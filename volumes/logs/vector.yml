data_dir: /vector-data-dir

api:
  enabled: true
  address: 0.0.0.0:9001

sources:
  docker_host:
    type: docker_logs
    docker_host: unix:///var/run/docker.sock

  docker_stdout:
    type: docker_logs
    docker_host: unix:///var/run/docker.sock
    include_labels:
      - "com.docker.compose.project=supabase"

transforms:
  only_auth:
    type: filter
    inputs:
      - docker_stdout
    condition:
      type: vrl
      source: .label."com.docker.compose.service" == "auth"

  only_rest:
    type: filter
    inputs:
      - docker_stdout
    condition:
      type: vrl
      source: .label."com.docker.compose.service" == "rest"

  only_realtime:
    type: filter
    inputs:
      - docker_stdout
    condition:
      type: vrl
      source: .label."com.docker.compose.service" == "realtime"

  only_storage:
    type: filter
    inputs:
      - docker_stdout
    condition:
      type: vrl
      source: .label."com.docker.compose.service" == "storage"

  only_functions:
    type: filter
    inputs:
      - docker_stdout
    condition:
      type: vrl
      source: .label."com.docker.compose.service" == "functions"

  only_db:
    type: filter
    inputs:
      - docker_stdout
    condition:
      type: vrl
      source: .label."com.docker.compose.service" == "db"

sinks:
  logflare_auth:
    type: http
    inputs:
      - only_auth
    uri: http://analytics:4000/api/logs?source_token=auth
    method: post
    healthcheck:
      enabled: false
    buffer:
      type: memory
      max_events: 500
      when_full: block
    request:
      timeout_secs: 5
    encoding:
      codec: json
    batch:
      max_bytes: 1048576
      timeout_secs: 5

  logflare_rest:
    type: http
    inputs:
      - only_rest
    uri: http://analytics:4000/api/logs?source_token=rest
    method: post
    healthcheck:
      enabled: false
    buffer:
      type: memory
      max_events: 500
      when_full: block
    request:
      timeout_secs: 5
    encoding:
      codec: json
    batch:
      max_bytes: 1048576
      timeout_secs: 5

  logflare_realtime:
    type: http
    inputs:
      - only_realtime
    uri: http://analytics:4000/api/logs?source_token=realtime
    method: post
    healthcheck:
      enabled: false
    buffer:
      type: memory
      max_events: 500
      when_full: block
    request:
      timeout_secs: 5
    encoding:
      codec: json
    batch:
      max_bytes: 1048576
      timeout_secs: 5

  logflare_storage:
    type: http
    inputs:
      - only_storage
    uri: http://analytics:4000/api/logs?source_token=storage
    method: post
    healthcheck:
      enabled: false
    buffer:
      type: memory
      max_events: 500
      when_full: block
    request:
      timeout_secs: 5
    encoding:
      codec: json
    batch:
      max_bytes: 1048576
      timeout_secs: 5

  logflare_functions:
    type: http
    inputs:
      - only_functions
    uri: http://analytics:4000/api/logs?source_token=functions
    method: post
    healthcheck:
      enabled: false
    buffer:
      type: memory
      max_events: 500
      when_full: block
    request:
      timeout_secs: 5
    encoding:
      codec: json
    batch:
      max_bytes: 1048576
      timeout_secs: 5

  logflare_db:
    type: http
    inputs:
      - only_db
    uri: http://analytics:4000/api/logs?source_token=db
    method: post
    healthcheck:
      enabled: false
    buffer:
      type: memory
      max_events: 500
      when_full: block
    request:
      timeout_secs: 5
    encoding:
      codec: json
    batch:
      max_bytes: 1048576
      timeout_secs: 5