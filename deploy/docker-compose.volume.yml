# Compose override that pins ALL persistent state onto the droplet's attached
# block-storage volume instead of Docker-managed volumes on the root disk. This
# is what makes the data survive `docker compose down`, a full stack rebuild, or
# even detaching the volume and reattaching it to a new droplet:
#
#   tor_data     → ${TOR_DATA_DIR}     the .onion hidden-service keys (address)
#   db_data      → ${DB_DATA_DIR}      the Postgres database (listings, users…)
#   uploads_data → ${UPLOADS_DIR}      uploaded images (listings, avatars, thumbs)
#   db_backups   → ${DB_BACKUPS_DIR}   pg backups
#
# Each host directory must already exist — deploy/provision.sh creates them all
# under the volume mount (default /mnt/unyunvolume/*).
#
# It is NOT part of the default stack: provision.sh wires it in by writing
#   COMPOSE_FILE=docker-compose.yml:deploy/docker-compose.volume.yml
# into .env, so every `docker compose` invocation on the droplet picks it up.
# Local dev / CI use the base docker-compose.yml alone (plain Docker volumes).

volumes:
  tor_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${TOR_DATA_DIR:?set TOR_DATA_DIR to the block-volume tor path, e.g. /mnt/unyunvolume/tor}
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DB_DATA_DIR:?set DB_DATA_DIR to the block-volume db path, e.g. /mnt/unyunvolume/db}
  uploads_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${UPLOADS_DIR:?set UPLOADS_DIR to the block-volume uploads path, e.g. /mnt/unyunvolume/uploads}
  db_backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DB_BACKUPS_DIR:?set DB_BACKUPS_DIR to the block-volume backups path, e.g. /mnt/unyunvolume/backups}
